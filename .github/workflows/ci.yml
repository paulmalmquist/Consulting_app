name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-mass-deletion:
    name: Check for mass deletions
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for mass deletion
        run: |
          # Count files deleted in this PR
          deleted=$(git diff origin/${{ github.base_ref }}...HEAD --diff-filter=D --name-only | wc -l)
          echo "Files deleted in this PR: $deleted"

          if [[ $deleted -gt 100 ]]; then
            echo "::error::Mass deletion detected! This PR deletes $deleted files."
            echo ""
            echo "First 20 deleted files:"
            git diff origin/${{ github.base_ref }}...HEAD --diff-filter=D --name-only | head -20
            exit 1
          fi

  backend-lint:
    name: Backend Lint (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff check
        run: python -m ruff check app tests

      - name: Backend pytest
        run: python -m pytest tests -q

  repo-guardrails:
    name: Repo Guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Repo guardrails
        run: node scripts/check_repo_guardrails.mjs

  frontend-quality:
    name: Frontend Lint + Typecheck + Unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: repo-b
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: repo-b/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit
