name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-mass-deletion:
    name: Check for mass deletions
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for mass deletion
        run: |
          # Count files deleted in this PR
          deleted=$(git diff origin/${{ github.base_ref }}...HEAD --diff-filter=D --name-only | wc -l)
          echo "Files deleted in this PR: $deleted"

          if [[ $deleted -gt 100 ]]; then
            echo "::error::Mass deletion detected! This PR deletes $deleted files."
            echo ""
            echo "First 20 deleted files:"
            git diff origin/${{ github.base_ref }}...HEAD --diff-filter=D --name-only | head -20
            exit 1
          fi

  backend-lint:
    name: Backend Lint (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff check
        run: python -m ruff check app tests

      - name: Backend pytest
        run: python -m pytest tests -q

  repo-guardrails:
    name: Repo Guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Repo guardrails
        run: node scripts/check_repo_guardrails.mjs

      - name: Assistant runtime validation
        run: node scripts/validate_assistant_runtime.mjs

  frontend-quality:
    name: Frontend Lint + Typecheck + Unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: repo-b
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: repo-b/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

  db-schema-gate:
    name: DB Schema Gate (apply + verify)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.5
        env:
          POSTGRES_DB: app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: repo-b/package-lock.json

      - name: Install repo-b deps
        working-directory: repo-b
        run: npm ci

      - name: Apply schema bundle
        run: make db:migrate

      - name: Apply schema bundle again (idempotency check)
        run: make db:migrate

      - name: Verify schema + seed baseline
        run: make db:verify

      - name: Backend schema contract check
        working-directory: backend
        run: |
          pip install -r requirements.txt -q
          python scripts/check_winston_schema.py

  production-smoke:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend-lint, frontend-quality, db-schema-gate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Winston production smoke test
        run: python scripts/smoke_companion_boot.py --json-only > smoke-result.json || true

      - name: Check smoke result
        run: |
          python3 -c "
          import json, sys
          with open('smoke-result.json') as f:
              r = json.load(f)
          s = r.get('summary', {})
          print(f'Readiness: {\"PASS\" if s.get(\"readiness\") else \"FAIL\"}')
          print(f'Schema:    {\"PASS\" if s.get(\"schema_ok\") else \"FAIL\"}')
          print(f'Bootstrap: {\"PASS\" if s.get(\"bootstrap_ok\") else \"FAIL\"}')
          h = s.get('prompts_healthy', 0)
          t = s.get('prompts_total', 0)
          print(f'Prompts:   {h}/{t} healthy')
          print(f'Overall:   {r.get(\"result\", \"UNKNOWN\")}')
          # Don't fail the CI job — smoke is observational for now
          # When ready to make it a hard gate, uncomment:
          # if not r.get('passed'): sys.exit(1)
          "

      - name: Upload smoke result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-result
          path: smoke-result.json

  winston-first-mile:
    name: Winston First-Mile Release Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: repo-b
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: repo-b/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Winston first-mile browser gate
        run: npx playwright test tests/global-commandbar.spec.ts --project=chromium --grep "boots on the RE"
